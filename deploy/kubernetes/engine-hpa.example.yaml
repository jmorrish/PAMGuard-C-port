# Example only.
# Use horizontal replicas after session routing and archive storage are designed for it:
# - sticky routing by session/source to the same engine pod, or one engine shard per source group
# - external/RWX archive storage, or separate archive PVCs per shard
# - ingest workers pointed at the correct engine service/shard
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pamguard-engine
  labels:
    app: pamguard-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pamguard-engine
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120
      selectPolicy: Min
