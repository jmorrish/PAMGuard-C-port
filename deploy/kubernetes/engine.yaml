apiVersion: v1
kind: ConfigMap
metadata:
  name: pamguard-engine-config
data:
  PAMGUARD_HTTP_THREADS: "32"
  PAMGUARD_MAX_SESSIONS: "64"
  PAMGUARD_MAX_PCM_BODY_BYTES: "8388608"
  PAMGUARD_MAX_ARCHIVE_QUERY_RECORDS: "10000"
  PAMGUARD_CORS_ORIGIN: "*"
  PAMGUARD_REQUIRE_SESSION_METADATA: "1"
  PAMGUARD_SESSION_CONFIG_DIR: "/data/sessions"
  PAMGUARD_RESULT_ARCHIVE_DIR: "/data/results"
  PAMGUARD_WEB_UI_FILE: "/app/web-ui/index.html"
  PAMGUARD_OPENAPI_FILE: "/app/openapi.yaml"
  # Enable this only when a supervisor writes the file into the shared data volume.
  # PAMGUARD_INGEST_STATUS_FILE: "/data/ingest-supervisor-status.json"
  # Enable this when lifecycle audit JSONL should be retained on the data volume.
  # PAMGUARD_AUDIT_LOG_FILE: "/data/audit.ndjson"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pamguard-engine-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pamguard-engine
  labels:
    app: pamguard-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pamguard-engine
  template:
    metadata:
      labels:
        app: pamguard-engine
    spec:
      containers:
        - name: engine
          image: pamguard-engine:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: pamguard-engine-config
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pamguard-engine-data
---
apiVersion: v1
kind: Service
metadata:
  name: pamguard-engine
  labels:
    app: pamguard-engine
spec:
  type: ClusterIP
  selector:
    app: pamguard-engine
  ports:
    - name: http
      port: 8080
      targetPort: http
