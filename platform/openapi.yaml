                          description: >-
                            True when the vector describes a surface of possible directions rather
                            than one direction, as for a line sub-array's bearing cone. Set only on
                            the line branch, matching the reference.
                  earthWorldVectors:
                    type: array
                    description: worldVectors rotated into the earth frame by array.orientation; present only when declared.
                    items:
                      type: object
                      properties:
                        x:
                          type: number
                        y:
                          type: number
                        z:
                          type: number
                        cone:
                          type: boolean
              arrayShape:
                type: string
                enum: [none, point, line, plane, volume]
                description: >-
                  Shape of the sub-array formed by this click's channels, from PAMGuard's
                  ArrayManager.getArrayShape. "none" means at least one channel has no declared
                  hydrophone.
              bearingLocaliser:
                type: string
                enum: [none, pair, grid]
                description: >-
                  Localiser class PAMGuard's BearingLocaliserSelector picks for that shape:
                  none for none/point, pair for a line, grid for a plane or volume. PAMGuard's
                  grid localiser (MLGridBearingLocaliser2) is unported; the engine runs its LSQ
                  localiser for "grid", which PAMGuard's own source lists as the alternative for
                  those two cases.
              lsqBearing:
                type: object
                description: >-
                  PAMGuard LSQBearingLocaliser output. Present only when bearingLocaliser is
                  "grid" and the sub-array has four or more hydrophones with full geometry and
                  positive spacingErrorM.
                properties:
                  azimuthRadians:
                    type: number
                  azimuthDegrees:
                    type: number
                  elevationRadians:
                    type: number
                  elevationDegrees:
                    type: number
                  azimuthErrorRadians:
                    type: number
                    description: Curvature-based error estimate; omitted when non-finite.
                  elevationErrorRadians:
                    type: number
                    description: Curvature-based error estimate; omitted when non-finite.
                  usedPairs:
                    type: integer
                  worldVectors:
                    type: array
                    description: >-
                      The fitted direction as a single unit vector in the array's xyz frame. Unlike
                      gridBearing.worldVectors this needs no array-axis rotation, because
                      LSQBearingLocaliser fits raw inter-hydrophone vectors and its azimuth and
                      elevation are already in that frame. One entry only; a plane sub-array's
                      mirror ambiguity is not expressed here.
                    items:
                      type: object
                      properties:
                        x:
                          type: number
                        y:
                          type: number
                        z:
                          type: number
                        cone:
                          type: boolean
                  earthWorldVectors:
                    type: array
                    description: worldVectors rotated into the earth frame by array.orientation; present only when declared.
                    items:
                      type: object
                      properties:
                        x:
                          type: number
                        y:
                          type: number
                        z:
                          type: number
                        cone:
                          type: boolean
