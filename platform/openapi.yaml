                GpsData.getQuaternion). Declaring it adds earth-frame direction vectors to
                bearing outputs; leaving it out leaves directions in the array frame with no
                earth-frame fields, rather than silently passing array-frame values off under
                an earth-frame name. Same clockwise-heading convention as streamer orientation.
                Distinct from streamers[].headingDegrees, which orients streamers WITHIN the
                array frame.
