          items:
            $ref: "#/components/schemas/ClickClassification"
        clickTrains:
          type: array
          items:
            $ref: "#/components/schemas/ClickTrain"
        clickLocalisations:
          type: array
          items:
            type: object
            properties:
              clickIndex:
                type: integer
              clickStartSample:
                type: integer
                format: int64
              relatedTrainIds:
                type: array
                items:
                  type: integer
              delays:
                type: array
                items:
                  type: object
                  properties:
                    pairIndex:
                      type: integer
                    channelA:
                      type: integer
                    channelB:
                      type: integer
                    audioChannelA:
                      type: integer
                    audioChannelB:
                      type: integer
                    delaySamples:
                      type: number
                    delaySeconds:
                      type: number
