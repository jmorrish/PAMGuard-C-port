                    type: number
                  phiRadians:
                    type: number
                  phiDegrees:
                    type: number
                  phiErrorRadians:
                    type: number
                  hasPhi:
                    type: boolean
                  usedPairs:
                    type: integer
                  worldVectors:
                    type: array
                    description: See the click localisation gridBearing field of the same name.
                    items:
                      type: object
                      properties:
                        x:
                          type: number
                        y:
                          type: number
                        z:
                          type: number
                        cone:
                          type: boolean
                  earthWorldVectors:
                    type: array
                    description: worldVectors rotated into the earth frame by array.orientation; present only when declared.
                    items:
                      type: object
                      properties:
                        x:
                          type: number
                        y:
                          type: number
                        z:
                          type: number
                        cone:
                          type: boolean
              arrayShape:
                type: string
                enum: [none, point, line, plane, volume]
                description: Shape of the sub-array formed by the whistle group's channels, from PAMGuard's ArrayManager.getArrayShape.
              bearingLocaliser:
                type: string
                enum: [none, pair, grid]
                description: Localiser class PAMGuard's BearingLocaliserSelector picks for that shape. See the click localisation field of the same name.
              lsqBearing:
                type: object
                description: >-
                  PAMGuard LSQ bearing for whistle groups. Present only when bearingLocaliser is
                  "grid" and the group has four or more fully-geometry hydrophones and positive
                  spacingErrorM. When present the region bearing is unambiguous.
                properties:
                  azimuthRadians:
                    type: number
                  azimuthDegrees:
                    type: number
                  elevationRadians:
                    type: number
                  elevationDegrees:
                    type: number
                  azimuthErrorRadians:
                    type: number
                  elevationErrorRadians:
                    type: number
                  usedPairs:
                    type: integer
                  worldVectors:
                    type: array
                    description: >-
                      The fitted direction as a single unit vector in the array's xyz frame. Unlike
                      gridBearing.worldVectors this needs no array-axis rotation, because
                      LSQBearingLocaliser fits raw inter-hydrophone vectors and its azimuth and
                      elevation are already in that frame. One entry only; a plane sub-array's
                      mirror ambiguity is not expressed here.
                    items:
                      type: object
                      properties:
                        x:
                          type: number
                        y:
                          type: number
                        z:
                          type: number
                        cone:
                          type: boolean
                  earthWorldVectors:
                    type: array
                    description: worldVectors rotated into the earth frame by array.orientation; present only when declared.
                    items:
                      type: object
                      properties:
                        x:
                          type: number
                        y:
                          type: number
                        z:
                          type: number
                        cone:
                          type: boolean
              delays:
                type: array
