                      type: number
                    geometryConstrained:
                      type: boolean
                    maxDelaySamples:
                      type: number
                    maxDelaySeconds:
                      type: number
                    hydrophoneDistanceM:
                      type: number
                    pairBearingRadians:
                      type: number
                      description: PAMGuard PairBearingLocaliser angle from the pair axis, present for geometry-constrained delays.
                    pairBearingDegrees:
                      type: number
                    pairBearingErrorRadians:
                      type: number
                      description: PAMGuard pair bearing error estimate; omitted when the reference formula yields a non-finite value (for example at the endfire clamp).
                    delayScore:
                      type: number
              lsqBearing:
                type: object
                description: PAMGuard LSQBearingLocaliser output, present for sessions with four or more hydrophones with full geometry and positive spacingErrorM.
                properties:
                  azimuthRadians:
                    type: number
                  azimuthDegrees:
                    type: number
                  elevationRadians:
                    type: number
                  elevationDegrees:
                    type: number
                  azimuthErrorRadians:
                    type: number
                    description: Curvature-based error estimate; omitted when non-finite.
                  elevationErrorRadians:
                    type: number
                    description: Curvature-based error estimate; omitted when non-finite.
                  usedPairs:
                    type: integer
        clickTrainLocalisations:
          type: array
          items:
            $ref: "#/components/schemas/ClickTrainLocalisation"
        clickBearings:
          type: array
          items:
